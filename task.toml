artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parsing a small access log and emitting three summary statistics is straightforward, everyday text processing."
solution_explanation = "Read /app/access.log line by line: count the request lines, collect distinct client IPs, tally the request paths, then write total_requests, unique_ips, and top_path to /app/report.json."
verification_explanation = "Run the reference solution, then parse /app/report.json and assert total_requests, unique_ips, and top_path equal the values computed from the fixed access.log; a no-op agent writes no report and fails."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
